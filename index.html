<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alltagsfreund Jenny – Haushalt & Nachbarschaftshilfe</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --v:#6b21d6; --v-d:#531aab; --v-l:#9b5de5;
      --p:#d946a8; --p-l:#f0abda; --p-pale:#fce7f3;
      --grad:linear-gradient(135deg,#6b21d6,#d946a8);
      --warm:#fdf4ff; --cream:#fff9fe;
      --text:#2d1a4a; --text-s:#5a3f8a;
      --border:#e9d5f7; --shadow:rgba(107,33,214,.1); --white:#fff;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);font-size:16px;line-height:1.7;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,249,254,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:72px;padding:0 52px;display:flex;align-items:center;justify-content:space-between;}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .nav-logo img{height:50px;width:auto;border-radius:8px;}
    .nav-logo-text{font-size:15px;font-weight:700;line-height:1.25;}
    .nav-logo-text strong{display:block;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .nav-logo-text small{font-size:10px;color:var(--text-s);font-weight:500;letter-spacing:.8px;}
    .nav-links{display:flex;gap:4px;list-style:none;}
    .nav-links a{text-decoration:none;color:var(--text-s);font-size:14px;font-weight:500;padding:7px 14px;border-radius:100px;transition:all .2s;}
    .nav-links a:hover{background:var(--p-pale);color:var(--v);}
    .nav-cta{background:var(--grad)!important;color:#fff!important;font-weight:700!important;}
    .nav-cta:hover{opacity:.88;transform:translateY(-1px);}

    /* HERO – Golden Ratio 58:42 */
    #home{display:grid;grid-template-columns:58fr 42fr;min-height:calc(100vh - 72px);margin-top:72px;}
    .hero-left{
      background:var(--warm);
      padding:60px 52px 60px 64px;
      display:flex;flex-direction:column;justify-content:center;gap:24px;
      position:relative;overflow:hidden;
    }
    .hero-left::before{content:'';position:absolute;top:-80px;left:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(107,33,214,.07),transparent 70%);pointer-events:none;}
    .hero-tag{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:600;color:var(--v);width:fit-content;}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--p);animation:blink 2s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    h1{font-family:'Playfair Display',serif;font-size:clamp(34px,3.6vw,52px);line-height:1.16;color:var(--text);}
    h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero-desc{font-size:16px;color:var(--text-s);max-width:460px;line-height:1.78;}
    .hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
    .btn-primary{background:var(--grad);color:#fff;padding:13px 26px;border-radius:100px;text-decoration:none;font-weight:700;font-size:15px;transition:all .2s;box-shadow:0 4px 16px rgba(107,33,214,.3);}
    .btn-primary:hover{opacity:.9;transform:translateY(-2px);}
    .btn-secondary{background:#fff;color:var(--v);padding:13px 26px;border-radius:100px;text-decoration:none;font-weight:700;font-size:15px;border:2px solid var(--v);transition:all .2s;}
    .btn-secondary:hover{background:var(--warm);}
    
    /* Trust Pills */
    .trust-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
    .trust-pill{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text-s);}

    /* Hero Right - Mit Logo und KI-Bild */
    .hero-right{
      position:relative;
      overflow:hidden;
      background:linear-gradient(150deg,#ede9fe 0%,#fce7f3 100%);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .hero-img{
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:0.95;
    }
    /* Schwebendes Logo-Element oben rechts im Bild */
    .hero-floating-logo {
      position:absolute;
      top:30px;
      right:30px;
      background:#fff;
      padding:12px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(107,33,214,0.15);
      border:1px solid var(--border);
      max-width:140px;
      height:auto;
      z-index:2;
    }
    .hero-overlay-card {
      position:absolute;
      bottom:30px;
      left:30px;
      right:30px;
      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(10px);
      border:1px solid var(--border);
      border-radius:16px;
      padding:20px;
      box-shadow:0 10px 30px rgba(107,33,214,0.15);
      z-index:2;
    }
    .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);text-align:center;gap:8px;}
    .stat-num{display:block;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .stat-label{display:block;font-size:11px;color:var(--text-s);font-weight:600;margin-top:2px;}

    /* WHY STRIP */
    .why-strip{background:var(--grad);padding:28px 52px;display:flex;justify-content:space-evenly;flex-wrap:wrap;gap:16px;}
    .why-item{display:flex;align-items:center;gap:12px;}
    .why-item *{color:#fff!important;}
    .why-icon{width:42px;height:42px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid rgba(255,255,255,.22);}
    .why-item strong{display:block;font-size:14px;font-weight:700;color:#fff;}
    .why-item span{font-size:12px;color:rgba(255,255,255,.88)!important;}

    /* SHARED */
    section{padding:100px 0;}
    .container{max-width:1140px;margin:0 auto;padding:0 52px;}
    .section-tag{display:inline-block;background:var(--p-pale);color:var(--p);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:14px;border:1px solid var(--p-l);}
    h2{font-family:'Playfair Display',serif;font-size:clamp(28px,2.8vw,42px);color:var(--text);line-height:1.22;margin-bottom:14px;}
    h2 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .lead{font-size:16px;color:var(--text-s);max-width:600px;line-height:1.8;margin-bottom:52px;}

    /* LEISTUNGEN */
    #leistungen{background:#fff;}
    .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
    .card{background:var(--cream);border:1px solid var(--border);border-radius:20px;padding:32px 28px;transition:all .25s;position:relative;overflow:hidden;}
    .card:hover{transform:translateY(-4px);box-shadow:0 16px 48px var(--shadow);border-color:var(--p-l);}
    .card-icon{width:52px;height:52px;background:var(--grad);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:18px;box-shadow:0 4px 14px rgba(107,33,214,.22);}
    .card h3{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:9px;color:var(--text);}
    .card p{font-size:14px;color:var(--text-s);line-height:1.72;margin-bottom:14px;}
    .card-tag{display:inline-block;background:var(--p-pale);color:var(--p);font-size:11px;font-weight:700;padding:3px 11px;border-radius:100px;border:1px solid var(--p-l);}
    .card-glow{position:absolute;bottom:0;right:0;width:88px;height:88px;background:radial-gradient(circle at bottom right,rgba(217,70,168,.09),transparent 70%);}

    /* NACHBARSCHAFTSHILFE – Golden Ratio 61.8% zu 38.2% */
    #nachbarschaftshilfe{background:var(--warm);}
    .two-col{display:grid;grid-template-columns:61.8fr 38.2fr;gap:52px;align-items:center;}
    .info-list{list-style:none;display:flex;flex-direction:column;gap:18px;}
    .info-list li{display:flex;gap:14px;align-items:flex-start;}
    .info-list-icon{font-size:18px;color:var(--p);margin-top:2px;}
    .info-list-text strong{display:block;font-size:16px;color:var(--text);margin-bottom:2px;}
    .info-list-text p{font-size:14px;color:var(--text-s);line-height:1.6;}
    
    /* Harmonisches Bild in der Sektion */
    .section-side-img{
      width:100%;
      height:450px;
      object-fit:cover;
      border-radius:24px;
      box-shadow:0 20px 40px rgba(107,33,214,0.08);
      border:1px solid var(--border);
    }

    /* RESPONSIVE MEDIA QUERIES */
    @media(max-width:992px){
      #home, .two-col{grid-template-columns:1fr;}
      .hero-right{height:450px;}
      .hero-floating-logo{top:20px;right:20px;max-width:110px;}
      .cards-grid{grid-template-columns:repeat(2,1fr);}
      nav{padding:0 24px;}
      .nav-links{display:none;}
    }
    @media(max-width:640px){
      .cards-grid{grid-template-columns:1fr;}
      section{padding:60px 0;}
      .container{padding:0 24px;}
      .hero-left{padding:40px 24px;}
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="#home" class="nav-logo">
      <!-- Dein Logo als direkter Code eingebaut -->
      <img src="https://allorigins.win" onerror="this.src='https://unsplash.com'" style="display:none;">
